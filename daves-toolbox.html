<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>html,body{margin:0;padding:0;background:transparent}</style>
</head><body>
<!-- Dave's AI Toolbox — placeholder (inline; no iframe, no JS) -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;900&family=Inter:wght@400;500;600&family=Share+Tech+Mono&display=swap');

.dat-wrap{
  --dat-green:#00A651; --dat-sky:#10CFC9; --dat-ink:#EDF3F9; --dat-muted:#90A6BD;
  position:relative; overflow:hidden; box-sizing:border-box; width:100%;
  border:1px solid rgba(255,255,255,.10); border-radius:clamp(18px,2.4vw,28px);
  background:linear-gradient(180deg, #1a4369 0%, #14375a 55%, #0f2a46 100%);
  box-shadow:0 18px 50px -34px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
  padding:clamp(30px,5vw,58px) clamp(20px,4vw,48px);
  font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  color:var(--dat-ink); text-align:center; -webkit-font-smoothing:antialiased;
}
.dat-wrap *{box-sizing:border-box; margin:0; padding:0}
.dat-wrap::before{
  content:""; position:absolute; left:50%; top:40%; transform:translate(-50%,-50%);
  width:min(580px,82%); height:260px; pointer-events:none;
  background:radial-gradient(ellipse at center, rgba(16,207,201,.16), rgba(16,207,201,0) 70%); filter:blur(8px);
}
.dat-inner{position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:clamp(11px,1.7vw,17px)}
.dat-eyebrow{font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:clamp(11px,1.2vw,13px);
  letter-spacing:.28em; text-transform:uppercase; color:var(--dat-sky); display:inline-flex; align-items:center; gap:9px}
.dat-eyebrow svg{width:17px; height:17px; flex:0 0 auto; fill:none; stroke:var(--dat-sky); stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round}
.dat-title{font-family:'Barlow Condensed',sans-serif; font-weight:900; line-height:.98;
  font-size:clamp(34px,6.4vw,68px); letter-spacing:.01em; text-transform:uppercase; text-wrap:balance}
.dat-title .ai{color:var(--dat-green)}
.dat-badge{font-family:'Share Tech Mono',monospace; font-size:clamp(12px,1.5vw,15px); letter-spacing:.34em;
  text-transform:uppercase; color:var(--dat-sky); border:1px solid rgba(16,207,201,.45); border-radius:999px;
  padding:7px 20px 7px 16px; background:rgba(16,207,201,.07); display:inline-flex; align-items:center; gap:10px;
  animation:dat-pulse 2.6s ease-in-out infinite}
.dat-badge .dot{width:8px; height:8px; border-radius:50%; background:var(--dat-sky); animation:dat-blip 2.6s ease-in-out infinite}
.dat-tag{max-width:48ch; font-size:clamp(13px,1.5vw,15px); line-height:1.55; color:var(--dat-muted); margin-top:clamp(2px,0.6vw,6px)}
.dat-tag b{color:#bccfe2; font-weight:600; font-style:italic}
@keyframes dat-pulse{0%,100%{border-color:rgba(16,207,201,.28); box-shadow:0 0 0 0 rgba(16,207,201,0)}
  50%{border-color:rgba(16,207,201,.62); box-shadow:0 0 24px -6px rgba(16,207,201,.45)}}
@keyframes dat-blip{0%,100%{box-shadow:0 0 0 0 rgba(16,207,201,.55)} 50%{box-shadow:0 0 0 7px rgba(16,207,201,0)}}
@media (prefers-reduced-motion:reduce){.dat-badge,.dat-badge .dot{animation:none}}

[data-theme="light"] .dat-wrap{background:linear-gradient(180deg,#f4f8fc 0%,#e9f0f7 55%,#dfe8f2 100%);border-color:rgba(15,40,70,.12);box-shadow:0 18px 50px -34px rgba(15,40,70,.35),inset 0 1px 0 rgba(255,255,255,.7);color:#16293c}
[data-theme="light"] .dat-wrap::before{background:radial-gradient(ellipse at center,rgba(16,207,201,.10),rgba(16,207,201,0) 70%)}
[data-theme="light"] .dat-eyebrow{color:#0E8A84}
[data-theme="light"] .dat-eyebrow svg{stroke:#0E8A84}
[data-theme="light"] .dat-badge{color:#0E8A84;border-color:rgba(14,138,132,.4);background:rgba(16,207,201,.08)}
[data-theme="light"] .dat-badge .dot{background:#0E8A84}
[data-theme="light"] .dat-tag{color:#5a6b7d}
</style>

<div class="dat-wrap">
  <div class="dat-inner">
    <span class="dat-eyebrow">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
      Qlik Sales Enablement
    </span>
    <h2 class="dat-title">Dave's <span class="ai">AI</span> Toolbox</h2>
    <span class="dat-badge"><span class="dot"></span>Coming Soon</span>
    <p class="dat-tag">A collection of AI-powered sales tools from the Enablement team, on the way.</p>
  </div>
</div>
<script>(function(){var K='qlikTheme';function a(m){var h=document.documentElement;if(m==='light')h.setAttribute('data-theme','light');else h.removeAttribute('data-theme');}var t='dark';try{t=localStorage.getItem(K)||'dark';}catch(e){}a(t);window.addEventListener('storage',function(e){if(e.key===K)a(e.newValue||'dark');});})();</script>
</body></html>
