<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>html,body{margin:0;padding:0;background:transparent}</style>
</head><body>
<!-- Learning Content Center — section title (inline; no iframe, no JS) -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;900&family=Inter:wght@400;500;600&display=swap');

.lcc-wrap{
  --lcc-green:#00A651; --lcc-sky:#10CFC9; --lcc-ink:#EDF3F9; --lcc-muted:#90A6BD;
  position:relative; overflow:hidden; box-sizing:border-box; width:100%;
  border:1px solid rgba(255,255,255,.10); border-radius:clamp(18px,2.4vw,28px);
  background:linear-gradient(180deg, #1a4369 0%, #14375a 55%, #0f2a46 100%);
  box-shadow:0 18px 50px -34px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
  padding:clamp(9px,1.4vw,15px) clamp(20px,4vw,44px);
  font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  color:var(--lcc-ink); text-align:center; -webkit-font-smoothing:antialiased;
}
.lcc-wrap *{box-sizing:border-box; margin:0; padding:0}
.lcc-wrap::before{
  content:""; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
  width:min(460px,72%); height:84px; pointer-events:none;
  background:radial-gradient(ellipse at center, rgba(16,207,201,.14), rgba(16,207,201,0) 70%); filter:blur(8px);
}
.lcc-inner{position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:clamp(4px,0.7vw,7px)}
.lcc-head{display:inline-flex; align-items:center; gap:clamp(7px,1vw,11px)}
.lcc-ic{flex:0 0 auto; width:clamp(18px,2.2vw,24px); height:clamp(18px,2.2vw,24px); fill:none; stroke:var(--lcc-sky); stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; opacity:.95}
.lcc-title{font-family:'Barlow Condensed',sans-serif; font-weight:900; line-height:1;
  font-size:clamp(18px,2.6vw,28px); letter-spacing:.03em; text-transform:uppercase; text-wrap:balance}
.lcc-title .ac{color:var(--lcc-sky)}
.lcc-rule{width:clamp(40px,5.4vw,58px); height:2px; border-radius:2px; margin-top:2px;
  background:linear-gradient(90deg, var(--lcc-sky), var(--lcc-green))}

[data-theme="light"] .lcc-wrap{background:linear-gradient(180deg,#f4f8fc 0%,#e9f0f7 55%,#dfe8f2 100%);border-color:rgba(15,40,70,.12);box-shadow:0 18px 50px -34px rgba(15,40,70,.35),inset 0 1px 0 rgba(255,255,255,.7);color:#16293c}
[data-theme="light"] .lcc-wrap::before{background:radial-gradient(ellipse at center,rgba(16,207,201,.08),rgba(16,207,201,0) 70%)}
[data-theme="light"] .lcc-ic{stroke:#0E8A84}
[data-theme="light"] .lcc-title .ac{color:#0E8A84}
[data-theme="light"] .lcc-rule{background:linear-gradient(90deg,#0E8A84,#009845)}
</style>

<div class="lcc-wrap">
  <div class="lcc-inner">
    <div class="lcc-head">
      <svg class="lcc-ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 7v13M12 7c-1.8-1.3-4.2-2-7-2v13c2.8 0 5.2.7 7 2M12 7c1.8-1.3 4.2-2 7-2v13c-2.8 0-5.2.7-7 2"/></svg>
      <h2 class="lcc-title">Learning <span class="ac">Content</span> Center</h2>
    </div>
    <span class="lcc-rule"></span>
  </div>
</div>
<script>(function(){var K='qlikTheme';function a(m){var h=document.documentElement;if(m==='light')h.setAttribute('data-theme','light');else h.removeAttribute('data-theme');}var t='dark';try{t=localStorage.getItem(K)||'dark';}catch(e){}a(t);window.addEventListener('storage',function(e){if(e.key===K)a(e.newValue||'dark');});})();</script>
</body></html>
